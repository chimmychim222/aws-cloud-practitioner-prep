name: Blog Auto-Publish

# Runs every Wednesday at 09:00 UTC.
# If no existing draft is waiting, generates one from the next queued topic in
# blog/topics.js. Runs 6 smoke-test checks. On pass, publishes directly to
# main and immediately deploys to GitHub Pages in a second job (no cross-workflow
# trigger needed). On fail, renames the draft to _held_[slug].md so the next
# run generates a fresh draft.
#
# Why the deploy job is here and not triggered by the push:
# A workflow using the default GITHUB_TOKEN cannot trigger other workflows via
# push. The deploy-after-publish job runs in the same workflow run, after the
# commit lands, so it is guaranteed to see the published post. It shares the
# same concurrency group ("pages") as deploy.yml to prevent conflicts.
#
# Weekly review: check blog-drafts/review-queue.md in the repo (excluded from
# the Pages deploy). Mark auto-published posts reviewed (⬜ → ✅) and
# investigate any HELD entries.
#
# Required repo secret: ANTHROPIC_API_KEY

on:
  schedule:
    - cron: '0 9 * * 3'   # Wednesday 09:00 UTC
  workflow_dispatch: {}    # allow manual triggering

jobs:
  auto-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      result: ${{ steps.smoke.outputs.result }}
      slug:   ${{ steps.smoke.outputs.slug }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Generate a new draft only when no publishable candidate already exists.
      # A "publishable candidate" is any .md in blog-drafts/ that does NOT start
      # with '_' (held drafts) and is not a meta file (PUBLISHING.md etc.).
      - name: Generate draft if none exists
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          CANDIDATE=$(find blog-drafts -maxdepth 1 -name '*.md' \
            ! -name '_*' \
            ! -name 'PUBLISHING.md' \
            ! -name 'review-queue.md' \
            ! -name '*.factcheck.md' \
            2>/dev/null | sort | head -1)
          if [ -z "$CANDIDATE" ]; then
            echo "No existing draft — generating from topic queue..."
            node scripts/generate-blog-draft.js
          else
            echo "Existing draft found: $CANDIDATE — skipping generation"
          fi

      - name: Smoke-test draft
        id: smoke
        run: node scripts/smoke-test-draft.js

      - name: Publish (smoke test passed)
        if: steps.smoke.outputs.result == 'pass'
        env:
          SMOKE_SLUG: ${{ steps.smoke.outputs.slug }}
        run: node scripts/publish-draft.js

      - name: Hold (smoke test failed)
        if: steps.smoke.outputs.result == 'fail'
        env:
          SMOKE_SLUG: ${{ steps.smoke.outputs.slug }}
          SMOKE_REASONS: ${{ steps.smoke.outputs.reasons }}
        run: node scripts/hold-draft.js

      - name: Commit and push changes to main
        if: steps.smoke.outputs.result != 'noop'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          if [ "${{ steps.smoke.outputs.result }}" = "pass" ]; then
            git commit -m "blog: auto-publish ${{ steps.smoke.outputs.slug }}"
          else
            git commit -m "blog: hold draft ${{ steps.smoke.outputs.slug }} (smoke-test failed)"
          fi
          git push

  # Deploy to GitHub Pages only when a new post was actually published.
  # Runs the same build/upload/deploy steps as deploy.yml, in the same
  # concurrency group, so it queues safely if a push-triggered deploy is
  # already in flight.
  deploy-after-publish:
    needs: auto-publish
    if: needs.auto-publish.outputs.result == 'pass'
    runs-on: ubuntu-latest
    concurrency:
      group: "pages"
      cancel-in-progress: false
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout (post-commit state)
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Remove unpublished directories
        run: rm -rf blog-drafts scripts .github CNAME.example

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
