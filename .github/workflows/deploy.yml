name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          # blog-drafts: unreviewed AI drafts must never be servable on the
          # live site, even by direct URL — see blog-drafts/PUBLISHING.md.
          # scripts: Node tooling, not site content.
          exclude_assets: '.github,CNAME.example,blog-drafts,scripts'
