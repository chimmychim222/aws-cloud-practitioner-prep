  <!-- ── AUTH MODAL ───────────────────────────────────────────────────────── -->
  <!--
    Required on every page so firebase-auth.js can open Sign In when the
    auth button is clicked. Do not remove.
  -->
  <div class="modal-overlay hidden" id="auth-modal">
    <div class="modal-content auth-modal-content">
      <button class="modal-close" id="auth-modal-close">&times;</button>
      <div class="auth-modal-header">
        <h2>Welcome</h2>
        <p class="auth-modal-subtitle">Sign in to access practice tests</p>
      </div>
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Sign In</button>
        <button class="auth-tab" data-tab="signup">Create Account</button>
      </div>
      <form class="auth-form" id="auth-form-login">
        <div class="auth-error hidden"></div>
        <div class="auth-field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="auth-field">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Your password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-lg auth-submit" id="login-submit">Sign In</button>
        <div class="auth-divider"><span>or</span></div>
        <button type="button" class="btn-google google-signin-btn">
          <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Continue with Google
        </button>
        <button type="button" class="auth-forgot-btn" id="forgot-password-btn">Forgot password?</button>
      </form>
      <form class="auth-form hidden" id="auth-form-signup">
        <div class="auth-error hidden"></div>
        <div class="auth-field">
          <label for="signup-name">Your Name</label>
          <input type="text" id="signup-name" placeholder="John Doe" required autocomplete="name">
        </div>
        <div class="auth-field">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="auth-field">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" placeholder="At least 6 characters" required minlength="6" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary btn-lg auth-submit" id="signup-submit">Create Account</button>
        <div class="auth-divider"><span>or</span></div>
        <button type="button" class="btn-google google-signin-btn">
          <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Continue with Google
